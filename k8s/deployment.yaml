apiVersion: apps/v1
kind: Deployment
metadata:
  name: egov-portal-site
  labels:
    app.kubernetes.io/name: egov-portal-site
    app.kubernetes.io/part-of: egovframe-template
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: egov-portal-site
  template:
    metadata:
      labels:
        app.kubernetes.io/name: egov-portal-site
        app.kubernetes.io/part-of: egovframe-template
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: app
          # Replace with your registry/tag, e.g. ghcr.io/<org>/egov-portal-site:5.0.0
          image: egovframe-portal-site-template:5.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "300m"
              memory: "640Mi"
            limits:
              cpu: "1500m"
              memory: "1.5Gi"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tomcat-work
              mountPath: /usr/local/tomcat/work
            - name: tomcat-temp
              mountPath: /usr/local/tomcat/temp
            - name: tomcat-logs
              mountPath: /usr/local/tomcat/logs
      volumes:
        - name: tomcat-work
          emptyDir: {}
        - name: tomcat-temp
          emptyDir: {}
        - name: tomcat-logs
          emptyDir: {}
