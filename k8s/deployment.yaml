apiVersion: apps/v1
kind: Deployment
metadata:
  name: egov-portal-site
  labels:
    app.kubernetes.io/name: egov-portal-site
    app.kubernetes.io/part-of: egovframe-template
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: egov-portal-site
  template:
    metadata:
      labels:
        app.kubernetes.io/name: egov-portal-site
        app.kubernetes.io/part-of: egovframe-template
    spec:
      # MySQL이 준비될 때까지 대기하는 initContainer
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "MySQL(mysql-db:3306) 준비 대기 중..."
              while ! nc -z mysql-db 3306; do
                sleep 3
              done
              echo "MySQL 준비 완료"
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: app
          # Replace with your registry/tag, e.g. ghcr.io/<org>/egov-portal-site:5.0.0
          image: egovframe-portal-site-template:5.0.0
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_HOST
              value: mysql-db
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: pst
            - name: DB_USERNAME
              value: pst
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "300m"
              memory: "640Mi"
            limits:
              cpu: "1500m"
              memory: "1.5Gi"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tomcat-work
              mountPath: /usr/local/tomcat/work
            - name: tomcat-temp
              mountPath: /usr/local/tomcat/temp
            - name: tomcat-logs
              mountPath: /usr/local/tomcat/logs
      volumes:
        - name: tomcat-work
          emptyDir: {}
        - name: tomcat-temp
          emptyDir: {}
        - name: tomcat-logs
          emptyDir: {}
